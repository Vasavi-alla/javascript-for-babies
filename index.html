<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fbf5e9" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iPad "Add to Home Screen": open fullscreen like a real app, with Vasavi as the icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="JS Sketchbook" />
    <title>JS Sketchbook — learn JavaScript visually, from zero to Playwright</title>

    <!-- SEO -->
    <meta
      name="description"
      content="JS Sketchbook: JavaScript for absolute beginners — a free, visual, hands-on course. Animated visualizations, typed checks, real code exercises, from zero all the way to Playwright automation testing."
    />
    <meta name="author" content="Vasavi" />

    <!-- Open Graph (link previews on LinkedIn, WhatsApp, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JS Sketchbook" />
    <meta property="og:title" content="JS Sketchbook — learn JavaScript visually, from zero to Playwright" />
    <meta
      property="og:description"
      content="JavaScript for absolute beginners — drawn, animated, and hands-on, all the way to Playwright automation testing. Free."
    />
    <meta property="og:url" content="https://jssketchbook.com/" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="JS Sketchbook — learn JavaScript visually, from zero to Playwright" />
    <meta
      name="twitter:description"
      content="JavaScript for absolute beginners — drawn, animated, and hands-on, all the way to Playwright automation testing. Free."
    />

    <!-- structured data: the site and its author -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "JS Sketchbook",
        "alternateName": ["JS Sketchbook — JavaScript visually", "JavaScript from zero to Playwright"],
        "description": "JavaScript for absolute beginners — a free, visual, hands-on course ending at Playwright automation testing.",
        "keywords": "learn javascript visually, javascript for beginners, javascript from zero, playwright for beginners, javascript for automation testing",
        "url": "https://jssketchbook.com/",
        "author": {
          "@type": "Person",
          "name": "Vasavi",
          "sameAs": ["https://www.linkedin.com/in/vasavi-alla/"]
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
